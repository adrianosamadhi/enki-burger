<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 70 70" width="70" height="70" fill="none">
  <!-- Rounded circular white backplate to make the icon stand out on dark browser tabs -->
  <circle cx="35" cy="35" r="32" fill="#FFFFFF" stroke="#FFEAE5" stroke-width="2" />

  <!-- Burger top lid -->
  <path
    d="M 15,30 C 15,16 23,12 35,12 C 47,12 55,16 55,30 Z"
    stroke="#FF3D00"
    stroke-width="3.2"
    stroke-linecap="round"
    stroke-linejoin="round"
    fill="#FFF5F2"
  />
  
  <!-- Patty -->
  <path
    d="M 13,35 C 18,33 21,37 25,35 C 29,33 33,37 37,35 C 41,33 45,37 49,35 C 53,33 57,35 57,35"
    stroke="#FF3D00"
    stroke-width="3.2"
    stroke-linecap="round"
  />
  
  <!-- Lettuce/Tomato -->
  <path
    d="M 17,40 L 30,40 L 35,46 L 40,40 L 53,40 C 55.5,40 55.5,46 53,46 L 17,46 C 14.5,46 14.5,40 17,40 Z"
    stroke="#000000"
    stroke-width="3.2"
    fill="#F7FFF9"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
  
  <!-- Bottom bun -->
  <path
    d="M 17,49 L 53,49 C 55.5,49 55.5,55 53,55 L 17,55 C 14.5,55 14.5,49 17,49 Z"
    stroke="#000000"
    stroke-width="3.2"
    fill="#FFFFFF"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
