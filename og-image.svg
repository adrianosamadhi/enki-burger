<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" fill="none">
  <!-- Warm gourmet background -->
  <rect width="1200" height="630" fill="#FFF8F5" />
  
  <!-- Stylized decorative background elements -->
  <circle cx="1050" cy="315" r="380" fill="#FFEFE9" opacity="0.6" />
  <circle cx="150" cy="100" r="180" fill="#FFEFE9" opacity="0.4" />
  <circle cx="1050" cy="315" r="280" fill="#FFDCD0" opacity="0.4" />

  <!-- Grid overlay for clean alignment -->
  <g opacity="0.05">
    <line x1="0" y1="105" x2="1200" y2="105" stroke="#FF3D00" stroke-width="2" />
    <line x1="0" y1="210" x2="1200" y2="210" stroke="#FF3D00" stroke-width="2" />
    <line x1="0" y1="315" x2="1200" y2="315" stroke="#FF3D00" stroke-width="2" />
    <line x1="0" y1="420" x2="1200" y2="420" stroke="#FF3D00" stroke-width="2" />
    <line x1="0" y1="525" x2="1200" y2="525" stroke="#FF3D00" stroke-width="2" />
    <line x1="150" y1="0" x2="150" y2="630" stroke="#FF3D00" stroke-width="2" />
    <line x1="300" y1="0" x2="300" y2="630" stroke="#FF3D00" stroke-width="2" />
    <line x1="450" y1="0" x2="450" y2="630" stroke="#FF3D00" stroke-width="2" />
    <line x1="600" y1="0" x2="600" y2="630" stroke="#FF3D00" stroke-width="2" />
    <line x1="750" y1="0" x2="750" y2="630" stroke="#FF3D00" stroke-width="2" />
    <line x1="900" y1="0" x2="900" y2="630" stroke="#FF3D00" stroke-width="2" />
  </g>

  <!-- Left Content Area inside container margin -->
  <g transform="translate(100, 0)">
    <!-- Brand Subtitle / Badge -->
    <rect y="130" width="220" height="42" rx="21" fill="#FFECE5" />
    <text x="110" y="156" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="14" fill="#FF3D00" letter-spacing="2" text-anchor="middle">CARDÁPIO DIGITAL</text>

    <!-- Main Store Name Logo Title -->
    <!-- The "ENKI" text -->
    <text y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="900" font-size="94" fill="#000000" letter-spacing="4">ENKI</text>
    
    <!-- Red line separating "ENKI" from "BURGER" -->
    <line x1="0" y1="290" x2="310" y2="290" stroke="#FF3D00" stroke-width="6" stroke-linecap="round" />

    <text x="155" y="340" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="34" fill="#000000" letter-spacing="18" text-anchor="middle">BURGER</text>

    <!-- App features / Call to Action -->
    <text y="420" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="24" fill="#55514F">Faça seu pedido online sem taxas!</text>
    <text y="460" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="500" font-size="20" fill="#88817D">Escolha • Monte • Peça pelo WhatsApp • Entrega Rápida</text>

    <!-- Action Badge with Green operational pulse simulator -->
    <rect y="500" width="280" height="50" rx="15" fill="#E8F8F0" />
    <circle cx="28" cy="525" r="7" fill="#10B981" />
    <text x="50" y="532" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="800" font-size="15" fill="#15803D" letter-spacing="1">ABERTO PARA PEDIDOS</text>
  </g>

  <!-- Right Content Area: Beautiful Large Vector Burger Illustration -->
  <g transform="translate(730, 115)">
    <!-- Background aura for burger -->
    <circle cx="200" cy="200" r="190" fill="#FFE9E0" />

    <!-- Scale and render detailed burger vector -->
    <g transform="scale(7.2) translate(-7, -4)">
      <!-- Top bun -->
      <path
        d="M 15,30 C 15,16 23,12 35,12 C 47,12 55,16 55,30 Z"
        stroke="#FF3D00"
        stroke-width="2.8"
        fill="#FFEFEA"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <!-- Sesame seeds on top bun -->
      <path d="M 28,18 L 30,19" stroke="#FF3D00" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 40,18 L 42,19" stroke="#FF3D00" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 34,23 L 36,24" stroke="#FF3D00" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 23,24 L 25,25" stroke="#FF3D00" stroke-width="1.5" stroke-linecap="round" />
      <path d="M 46,24 L 48,25" stroke="#FF3D00" stroke-width="1.5" stroke-linecap="round" />

      <!-- Melting Cheese -->
      <path
        d="M 14,35.5 L 56,35.5 L 50,40 L 40,35.5 L 34,42 L 28,35.5 L 20,41 Z"
        fill="#FFC107"
      />

      <!-- Patty -->
      <path
        d="M 13,35 C 18,33 21,37 25,35 C 29,33 33,37 37,35 C 41,33 45,37 49,35 C 53,33 57,35 57,35"
        stroke="#FF3D00"
        stroke-width="2.8"
        stroke-linecap="round"
      />

      <!-- Lettuce / Interlaced Tomato -->
      <path
        d="M 17,40 L 30,40 L 35,46 L 40,40 L 53,40 C 55.5,40 55.5,46 53,46 L 17,46 C 14.5,46 14.5,40 17,40 Z"
        stroke="#000000"
        stroke-width="2.8"
        fill="#E8F8F0"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- Bottom Bun -->
      <path
        d="M 17,49 L 53,49 C 55.5,49 55.5,55 53,55 L 17,55 C 14.5,55 14.5,49 17,49 Z"
        stroke="#000000"
        stroke-width="2.8"
        fill="#FFF9F6"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
    </g>
  </g>
</svg>
